server:
  port: ${SMARTCAMPUS_SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        max-age: 2592000s

spring:
  application:
    name: smartcampus-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SMARTCAMPUS_DB_URL:jdbc:mysql://localhost:3306/smart_campus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SMARTCAMPUS_DB_USERNAME:root}
    password: ${SMARTCAMPUS_DB_PASSWORD:123456}
  data:
    redis:
      host: ${SMARTCAMPUS_REDIS_HOST:192.168.100.128}
      port: ${SMARTCAMPUS_REDIS_PORT:6379}
      database: ${SMARTCAMPUS_REDIS_DATABASE:0}
      password: ${SMARTCAMPUS_REDIS_PASSWORD:123456}
      timeout: ${SMARTCAMPUS_REDIS_TIMEOUT:5000ms}
  session:
    store-type: redis
    timeout: 2592000s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

smart-campus:
  jwt:
    secret: ${SMARTCAMPUS_JWT_SECRET:}
    secret-file: ${SMARTCAMPUS_JWT_SECRET_FILE:config/jwt-secret.txt}
    expiration-minutes: ${SMARTCAMPUS_JWT_EXPIRATION_MINUTES:120}

springdoc:
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
