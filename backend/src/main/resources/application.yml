server:
  port: 8080

spring:
  application:
    name: smartcampus-backend

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

smart-campus:
  jwt:
    secret: ${SMARTCAMPUS_JWT_SECRET:}
    secret-file: ${SMARTCAMPUS_JWT_SECRET_FILE:config/jwt-secret.txt}
    expiration-minutes: ${SMARTCAMPUS_JWT_EXPIRATION_MINUTES:120}

springdoc:
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
